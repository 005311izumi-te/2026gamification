<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Race - 星々を巡る旅</title>
<style>
/* ===== Reset & Base ===== */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Hiragino Sans',sans-serif;background:#0a0e27;color:#fff;overflow-x:hidden}

/* ===== Stars Background ===== */
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.stars canvas{width:100%;height:100%}

/* ===== Header ===== */
header{position:relative;z-index:10;text-align:center;padding:20px 10px 10px;
  background:linear-gradient(180deg,rgba(10,14,39,.95),transparent)}
header h1{font-size:2rem;background:linear-gradient(90deg,#ffd700,#ff6b6b,#00d4ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;letter-spacing:.1em}
header p{font-size:.85rem;color:#8899cc;margin-top:4px}

/* ===== Top Banner ===== */
.top-banner{position:relative;z-index:10;text-align:center;padding:8px;
  background:linear-gradient(90deg,rgba(255,215,0,.15),rgba(255,215,0,.05));
  border-bottom:1px solid rgba(255,215,0,.3)}
.top-banner .crown{font-size:1.4rem}
.top-banner .leader-name{font-size:1.1rem;font-weight:bold;color:#ffd700;margin:0 8px}
.top-banner .leader-pts{font-size:.85rem;color:#ccaa44}

/* ===== Layout ===== */
.app-container{position:relative;z-index:10;display:flex;flex-wrap:wrap;gap:10px;padding:10px;max-width:1400px;margin:0 auto}
.map-section{flex:1 1 70%;min-width:320px}
.ranking-section{flex:1 1 25%;min-width:280px;max-width:380px}

/* ===== Map ===== */
.map-container{position:relative;background:radial-gradient(ellipse at 30% 40%,#1a1040 0%,#0a0e27 60%,#050818 100%);
  border-radius:16px;border:1px solid rgba(100,120,255,.2);overflow:hidden;padding:0;min-height:520px;cursor:grab}
.map-container:active{cursor:grabbing}
.map-container::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background:url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=1200&q=30') center/cover no-repeat;
  opacity:.12;pointer-events:none}

/* Zoom controls */
.zoom-controls{position:absolute;top:10px;right:10px;z-index:20;display:flex;flex-direction:column;gap:4px}
.zoom-controls button{width:36px;height:36px;border:1px solid rgba(100,150,255,.3);
  background:rgba(15,20,50,.85);color:#aaccff;border-radius:8px;cursor:pointer;font-size:1.2rem;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.zoom-controls button:hover{background:rgba(40,60,120,.8);border-color:rgba(100,180,255,.6)}
.zoom-label{font-size:.65rem;color:#6677aa;text-align:center;padding:2px 0}

/* Track */
.track-wrapper{width:100%;height:520px;overflow:hidden;position:relative}
.track{position:relative;transform-origin:0 0;transition:transform .3s ease}
.track-path{position:absolute;top:0;left:0;width:100%;height:100%}

/* Ship (koma) */
.ship{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:pointer;
  transition:all 1.5s cubic-bezier(.25,.46,.45,.94);z-index:5}
.ship:hover{z-index:20;transform:scale(1.3)}
.ship .helmet{width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,#2a3a6a,#1a2040);border:2px solid #4466aa;
  display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.ship .helmet .visor{width:32px;height:32px;border-radius:50%;overflow:hidden;
  border:1px solid rgba(100,200,255,.4)}
.ship .helmet .visor img{width:100%;height:100%;object-fit:cover}
.ship .helmet .visor .initials{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:bold;background:linear-gradient(135deg,#334,#556);color:#aaccff}
.ship .name-plate{margin-top:3px;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:bold;
  background:rgba(0,0,0,.7);border:1px solid rgba(100,150,255,.3);white-space:nowrap;text-align:center}

/* Flame effects */
.ship .flame{position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:16px;height:20px;opacity:0}
.ship.normal .flame{opacity:0}
.ship.smile .flame{opacity:1;animation:flame-blue .3s infinite alternate}
.ship.fire .flame{opacity:1;width:24px;height:30px;animation:flame-red .15s infinite alternate}

@keyframes flame-blue{
  0%{filter:drop-shadow(0 0 4px #0088ff);background:radial-gradient(ellipse,#00aaff,#0044aa,transparent)}
  100%{filter:drop-shadow(0 0 8px #00aaff);background:radial-gradient(ellipse,#44ccff,#0066cc,transparent)}
}
@keyframes flame-red{
  0%{filter:drop-shadow(0 0 6px #ff4400);background:radial-gradient(ellipse,#ff6600,#cc0000,transparent)}
  100%{filter:drop-shadow(0 0 12px #ff6600);background:radial-gradient(ellipse,#ffaa00,#ff2200,transparent)}
}

/* Aura */
.ship.smile .helmet{box-shadow:0 0 12px rgba(0,150,255,.5)}
.ship.fire .helmet{box-shadow:0 0 20px rgba(255,80,0,.7);animation:pulse-fire .5s infinite alternate}
@keyframes pulse-fire{0%{box-shadow:0 0 20px rgba(255,80,0,.7)}100%{box-shadow:0 0 35px rgba(255,120,0,.9)}}

/* Track dots */
.track-dot{position:absolute;width:6px;height:6px;border-radius:50%;background:rgba(150,180,255,.3);
  box-shadow:0 0 4px rgba(150,180,255,.2)}
.track-dot.planet{width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#667,#334);box-shadow:0 0 8px rgba(100,150,255,.3)}
.track-dot.nebula{width:40px;height:40px;border-radius:50%;
  background:radial-gradient(circle,rgba(150,50,200,.2),transparent);filter:blur(8px)}

/* ===== Ranking ===== */
.ranking-panel{background:linear-gradient(180deg,rgba(15,20,50,.95),rgba(10,14,39,.95));
  border:1px solid rgba(100,120,255,.2);border-radius:16px;padding:16px}
.ranking-panel h2{font-size:1rem;color:#8899cc;margin-bottom:12px;text-align:center;letter-spacing:.15em}

.rank-item{display:flex;align-items:center;gap:8px;padding:8px 10px;margin-bottom:6px;
  border-radius:10px;background:rgba(30,40,80,.5);border:1px solid rgba(100,120,255,.1);
  transition:all .3s;cursor:pointer}
.rank-item:hover{background:rgba(40,55,110,.6);border-color:rgba(100,150,255,.3)}
.rank-item.gold{border-color:rgba(255,215,0,.4);background:rgba(60,50,20,.4)}
.rank-item.silver{border-color:rgba(192,192,192,.3);background:rgba(50,50,60,.4)}
.rank-item.bronze{border-color:rgba(205,127,50,.3);background:rgba(50,40,30,.4)}

.rank-num{font-size:1.1rem;font-weight:bold;width:28px;text-align:center}
.rank-item.gold .rank-num{color:#ffd700}
.rank-item.silver .rank-num{color:#c0c0c0}
.rank-item.bronze .rank-num{color:#cd7f32}

.rank-info{flex:1}
.rank-name{font-size:.85rem;font-weight:bold}
.rank-detail{font-size:.7rem;color:#7788aa;margin-top:2px}
.rank-pts{font-size:1rem;font-weight:bold;color:#00d4ff}
.rank-bar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:4px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:2px;transition:width 1.5s ease}

/* ===== Tooltip ===== */
.tooltip{position:fixed;z-index:100;background:rgba(15,20,50,.95);border:1px solid rgba(100,150,255,.4);
  border-radius:10px;padding:12px;pointer-events:none;opacity:0;transition:opacity .2s;min-width:180px}
.tooltip.show{opacity:1}
.tooltip h3{font-size:.9rem;color:#ffd700;margin-bottom:6px}
.tooltip .stat{font-size:.75rem;color:#aabbdd;margin:3px 0}
.tooltip .stat span{color:#00d4ff;font-weight:bold}

/* ===== Week Toggle ===== */
.week-toggle{text-align:center;margin:10px 0;position:relative;z-index:10}
.week-toggle button{padding:8px 20px;margin:0 4px;border:1px solid rgba(100,150,255,.3);
  background:rgba(20,30,60,.8);color:#aabbdd;border-radius:8px;cursor:pointer;font-size:.85rem;transition:all .3s}
.week-toggle button.active{background:rgba(40,60,120,.8);color:#fff;border-color:rgba(100,180,255,.6);
  box-shadow:0 0 10px rgba(100,150,255,.2)}
.week-toggle button:hover{border-color:rgba(100,180,255,.5)}

/* ===== Animation overlay ===== */
.anim-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;pointer-events:none;display:none}
.anim-overlay.active{display:block}
.warp-line{position:absolute;width:2px;background:linear-gradient(180deg,transparent,#00aaff,transparent);
  animation:warp-streak .6s linear forwards;opacity:0}
@keyframes warp-streak{0%{opacity:0;transform:translateY(-100vh)}50%{opacity:1}100%{opacity:0;transform:translateY(100vh)}}

/* ===== Responsive ===== */
@media(max-width:768px){
  .app-container{flex-direction:column}
  .ranking-section{max-width:100%}
  header h1{font-size:1.4rem}
  .track{height:400px}
}
</style>
</head>
<body>

<!-- Stars canvas -->
<div class="stars"><canvas id="starsCanvas"></canvas></div>

<!-- Header -->
<header>
  <h1>GALAXY RACE ~星々を巡る旅~</h1>
  <p>教室対抗すごろくレース</p>
</header>

<!-- Top banner -->
<div class="top-banner" id="topBanner">
  <span class="crown">👑</span>
  <span class="leader-name" id="leaderName">---</span>
  <span class="leader-pts" id="leaderPts">0 pts</span>
</div>

<!-- Week toggle -->
<div class="week-toggle">
  <button id="btnWeek1" onclick="setWeek(1)">先々週</button>
  <button id="btnWeek2" class="active" onclick="setWeek(2)">先週（最新）</button>
  <button id="btnAnimate" onclick="playAnimation()">🚀 レース再生</button>
</div>

<!-- Main content -->
<div class="app-container">
  <!-- Map -->
  <div class="map-section">
    <div class="map-container" id="mapContainer">
      <div class="zoom-controls">
        <button onclick="zoomIn()" title="ズームイン">+</button>
        <button onclick="zoomOut()" title="ズームアウト">-</button>
        <div class="zoom-label" id="zoomLabel">100%</div>
        <button onclick="zoomReset()" title="リセット" style="font-size:.75rem">↺</button>
        <button onclick="zoomToLeaders()" title="先頭グループ" style="font-size:.75rem">🏁</button>
      </div>
      <div class="track-wrapper" id="trackWrapper">
        <div class="track" id="track"></div>
      </div>
    </div>
  </div>
  <!-- Ranking -->
  <div class="ranking-section">
    <div class="ranking-panel" id="rankingPanel">
      <h2>🏆 ランキング</h2>
      <div id="rankingList"></div>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<!-- Animation overlay -->
<div class="anim-overlay" id="animOverlay"></div>

<script>
// ===== Data =====
const classrooms = [
  {name:'王寺',   hw1:85,q1:72,hw2:88,q2:75},
  {name:'学園前', hw1:92,q1:81,hw2:89,q2:78},
  {name:'京田辺', hw1:78,q1:68,hw2:82,q2:72},
  {name:'郡山',   hw1:81,q1:74,hw2:84,q2:76},
  {name:'五位堂', hw1:89,q1:77,hw2:91,q2:80},
  {name:'高の原', hw1:87,q1:73,hw2:85,q2:71},
  {name:'高田',   hw1:83,q1:69,hw2:86,q2:74},
  {name:'桜井',   hw1:79,q1:65,hw2:81,q2:70},
  {name:'神宮',   hw1:91,q1:79,hw2:93,q2:82},
  {name:'生駒',   hw1:86,q1:75,hw2:88,q2:78},
  {name:'西大寺', hw1:80,q1:70,hw2:83,q2:73},
  {name:'登美ヶ丘',hw1:84,q1:72,hw2:87,q2:76},
  {name:'奈良',   hw1:82,q1:71,hw2:85,q2:75},
  {name:'八木',   hw1:88,q1:76,hw2:90,q2:79},
  {name:'木津南', hw1:76,q1:67,hw2:80,q2:69},
];

const shipColors = [
  '#ff6b6b','#ffa94d','#ffd43b','#69db7c','#38d9a9',
  '#4dabf7','#748ffc','#9775fa','#da77f2','#f783ac',
  '#ff8787','#e599f7','#66d9e8','#a9e34b','#ffe066'
];

// ===== Zoom & Pan state =====
let zoomLevel = 1;
let panX = 0, panY = 0;
let isDragging = false;
let dragStartX, dragStartY, dragPanStartX, dragPanStartY;
const ZOOM_MIN = 1, ZOOM_MAX = 5, ZOOM_STEP = 0.5;

// The track is drawn on a large internal canvas for spreading ships
const TRACK_WIDTH = 2400;
const TRACK_HEIGHT = 500;

// ===== Track path =====
function generateTrackPoints(numPoints) {
  const pts = [];
  for (let i = 0; i < numPoints; i++) {
    const t = i / (numPoints - 1);
    const x = 40 + t * (TRACK_WIDTH - 80);
    const y = 40 + (TRACK_HEIGHT - 80) / 2 + Math.sin(t * Math.PI * 3.5) * ((TRACK_HEIGHT - 80) * 0.38);
    pts.push({x, y});
  }
  return pts;
}

let trackPoints = [];
let currentWeek = 2;
let ships = [];

// ===== Points =====
function getPoints(c, week) {
  if (week === 1) return c.hw1 + c.q1;
  return c.hw1 + c.q1 + c.hw2 + c.q2;
}
function getWeekPoints(c, week) {
  if (week === 1) return {hw: c.hw1, q: c.q1, total: c.hw1 + c.q1};
  return {hw: c.hw2, q: c.q2, total: c.hw2 + c.q2};
}
function getStatus(weekPts) {
  if (weekPts >= 160) return 'fire';
  if (weekPts >= 100) return 'smile';
  return 'normal';
}

// ===== Initialize =====
function init() {
  initStars();
  trackPoints = generateTrackPoints(600);
  const track = document.getElementById('track');
  track.style.width = TRACK_WIDTH + 'px';
  track.style.height = TRACK_HEIGHT + 'px';
  renderTrackDots();
  renderShips();
  updateRanking();
  updateLeader();
  initDragPan();
  applyTransform();
}

// ===== Stars =====
function initStars() {
  const canvas = document.getElementById('starsCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const stars = [];
  for (let i = 0; i < 300; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.3,
      a: Math.random(),
      speed: Math.random() * 0.02 + 0.005
    });
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a += s.speed;
      const alpha = 0.3 + Math.sin(s.a) * 0.4;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,200,255,${Math.max(0, alpha)})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// ===== Track dots =====
function renderTrackDots() {
  const track = document.getElementById('track');
  track.querySelectorAll('.track-dot').forEach(d => d.remove());

  for (let i = 0; i < trackPoints.length; i += 6) {
    const dot = document.createElement('div');
    dot.className = 'track-dot';
    dot.style.left = trackPoints[i].x + 'px';
    dot.style.top = trackPoints[i].y + 'px';
    track.appendChild(dot);
  }
  [60, 150, 250, 360, 480, 560].forEach(i => {
    if (i < trackPoints.length) {
      const p = document.createElement('div');
      p.className = 'track-dot planet';
      p.style.left = (trackPoints[i].x - 4) + 'px';
      p.style.top = (trackPoints[i].y - 4) + 'px';
      track.appendChild(p);
    }
  });
  [100, 300, 500].forEach(i => {
    if (i < trackPoints.length) {
      const n = document.createElement('div');
      n.className = 'track-dot nebula';
      n.style.left = (trackPoints[i].x - 20) + 'px';
      n.style.top = (trackPoints[i].y - 20) + 'px';
      track.appendChild(n);
    }
  });
}

// ===== Position on track - spread differences more =====
function getTrackPosition(totalPts, minPts, maxPts) {
  // Use a spread mapping: bottom 20% of track for the range below minPts,
  // remaining 80% for the actual point range between min and max
  const range = maxPts - minPts;
  if (range === 0) return trackPoints[Math.floor(trackPoints.length / 2)];
  const normalizedRatio = (totalPts - minPts) / range; // 0..1 within the actual data range
  // Map to 15%..100% of track so even last place is visible
  const trackRatio = 0.15 + normalizedRatio * 0.85;
  const idx = Math.min(Math.floor(trackRatio * (trackPoints.length - 1)), trackPoints.length - 1);
  return trackPoints[idx];
}

// ===== Render Ships =====
function renderShips() {
  const track = document.getElementById('track');
  track.querySelectorAll('.ship').forEach(s => s.remove());
  ships = [];

  const allPts = classrooms.map(c => getPoints(c, currentWeek));
  const maxPts = Math.max(...allPts);
  const minPts = Math.min(...allPts);

  // Sort by points for stacking (lower z for lower pts)
  const indexed = classrooms.map((c, i) => ({c, i, pts: allPts[i]}));
  indexed.sort((a, b) => a.pts - b.pts);

  // Track which positions are occupied for smart vertical offset
  const occupied = [];

  indexed.forEach(({c, i, pts}) => {
    const weekPts = getWeekPoints(c, currentWeek);
    const status = getStatus(weekPts.total);
    const pos = getTrackPosition(pts, minPts, maxPts);

    // Smart vertical offset to avoid overlap
    let bestOffset = 0;
    let minOverlap = Infinity;
    for (let tryOff = -60; tryOff <= 60; tryOff += 20) {
      const testY = pos.y + tryOff;
      const testX = pos.x;
      let closest = Infinity;
      occupied.forEach(o => {
        const dist = Math.sqrt((o.x - testX) ** 2 + (o.y - testY) ** 2);
        if (dist < closest) closest = dist;
      });
      if (closest > minOverlap || closest === Infinity) {
        minOverlap = closest;
        bestOffset = tryOff;
      }
    }
    // Pick the offset with most distance from others
    let finalOffset = 0;
    let maxDist = 0;
    for (let tryOff = -60; tryOff <= 60; tryOff += 15) {
      const testY = pos.y + tryOff;
      let closestDist = Infinity;
      occupied.forEach(o => {
        const dist = Math.sqrt((o.x - pos.x) ** 2 + (o.y - testY) ** 2);
        if (dist < closestDist) closestDist = dist;
      });
      if (closestDist > maxDist) {
        maxDist = closestDist;
        finalOffset = tryOff;
      }
    }

    occupied.push({x: pos.x, y: pos.y + finalOffset});

    const ship = document.createElement('div');
    ship.className = `ship ${status}`;
    ship.style.left = (pos.x - 22) + 'px';
    ship.style.top = (pos.y - 30 + finalOffset) + 'px';
    ship.dataset.index = i;

    ship.innerHTML = `
      <div class="helmet" style="border-color:${shipColors[i]}">
        <div class="visor">
          <div class="initials" style="background:linear-gradient(135deg,${shipColors[i]}44,${shipColors[i]}22)">${c.name.slice(0,2)}</div>
        </div>
      </div>
      <div class="flame" style="background:radial-gradient(ellipse,${status==='fire'?'#ff6600,#cc0000':'#00aaff,#0044aa'},transparent)"></div>
      <div class="name-plate" style="border-color:${shipColors[i]}80">${c.name}</div>
    `;

    ship.addEventListener('mouseenter', e => showTooltip(e, c, weekPts, pts));
    ship.addEventListener('mouseleave', hideTooltip);
    ship.addEventListener('touchstart', e => { e.preventDefault(); showTooltip(e, c, weekPts, pts); }, {passive:false});

    track.appendChild(ship);
    ships[i] = ship; // index by original classroom index
  });
}

// ===== Tooltip =====
function showTooltip(e, c, weekPts, totalPts) {
  const tip = document.getElementById('tooltip');
  const status = getStatus(weekPts.total);
  const statusLabel = status === 'fire' ? '🔥 激アツ！' : status === 'smile' ? '😊 好調！' : '🚀 前進中';

  const allPts = classrooms.map(cl => getPoints(cl, currentWeek)).sort((a,b) => b - a);
  const rank = allPts.indexOf(totalPts) + 1;

  tip.innerHTML = `
    <h3>${c.name}教室</h3>
    <div class="stat">状態: <span>${statusLabel}</span></div>
    <div class="stat">宿題実施率: <span>${weekPts.hw}%</span></div>
    <div class="stat">80点以上率: <span>${weekPts.q}%</span></div>
    <div class="stat" style="border-top:1px solid rgba(100,150,255,.2);margin-top:6px;padding-top:6px">
      今週獲得: <span>${weekPts.total}pt</span></div>
    <div class="stat">累計（マップ位置）: <span>${totalPts}pt</span></div>
  `;
  tip.classList.add('show');
  const rect = e.target.closest('.ship').getBoundingClientRect();
  tip.style.left = Math.min(rect.right + 10, window.innerWidth - 200) + 'px';
  tip.style.top = Math.min(rect.top, window.innerHeight - 160) + 'px';
}
function hideTooltip() {
  document.getElementById('tooltip').classList.remove('show');
}

// ===== Ranking =====
function updateRanking() {
  const list = document.getElementById('rankingList');
  // ランキングはその週の獲得ptで並び替え
  const sorted = classrooms.map((c, i) => ({
    ...c, i,
    cumulative: getPoints(c, currentWeek),
    week: getWeekPoints(c, currentWeek)
  })).sort((a, b) => b.week.total - a.week.total);

  const maxPts = sorted[0].week.total;
  const minPts = sorted[sorted.length - 1].week.total;
  const range = maxPts - minPts || 1;

  const weekLabel = currentWeek === 1 ? '先々週' : '先週';

  list.innerHTML = sorted.map((c, rank) => {
    const medal = rank === 0 ? 'gold' : rank === 1 ? 'silver' : rank === 2 ? 'bronze' : '';
    const pct = ((c.week.total - minPts) / range * 80 + 20).toFixed(0);
    const barColor = c.week.total >= 160 ? '#ff6b35' : c.week.total >= 100 ? '#4dabf7' : '#556';
    const diff = rank > 0 ? sorted[rank - 1].week.total - c.week.total : 0;
    const diffText = rank > 0 ? `▲${diff}pt差` : '';
    return `
      <div class="rank-item ${medal}" onmouseenter="highlightShip(${c.i})" onmouseleave="unhighlightShip(${c.i})"
           onclick="focusShip(${c.i})">
        <div class="rank-num">${rank + 1}</div>
        <div class="rank-info">
          <div class="rank-name">${c.name}教室 <span style="font-size:.65rem;color:#556;font-weight:normal">累計${c.cumulative}pt</span></div>
          <div class="rank-detail">宿題${c.week.hw}% / テスト${c.week.q}% ${diffText}</div>
          <div class="rank-bar"><div class="rank-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
        </div>
        <div class="rank-pts">${c.week.total}<span style="font-size:.6rem;color:#556">pt</span></div>
      </div>
    `;
  }).join('');

  document.getElementById('rankingPanel').querySelector('h2').textContent = `🏆 ${weekLabel}ランキング`;
}

function highlightShip(i) {
  if (ships[i]) { ships[i].style.transform = 'scale(1.4)'; ships[i].style.zIndex = '30'; }
}
function unhighlightShip(i) {
  if (ships[i]) { ships[i].style.transform = ''; ships[i].style.zIndex = ''; }
}

// ===== Focus on a ship (zoom to it) =====
function focusShip(i) {
  if (!ships[i]) return;
  const shipLeft = parseFloat(ships[i].style.left) + 22;
  const shipTop = parseFloat(ships[i].style.top) + 30;
  zoomLevel = 3;
  const wrapper = document.getElementById('trackWrapper');
  const wW = wrapper.clientWidth;
  const wH = wrapper.clientHeight;
  panX = -(shipLeft * zoomLevel - wW / 2);
  panY = -(shipTop * zoomLevel - wH / 2);
  clampPan();
  applyTransform();
}

// ===== Leader =====
function updateLeader() {
  // マップトップ = 累計ポイント1位
  const sortedMap = classrooms.map(c => ({
    name: c.name, total: getPoints(c, currentWeek)
  })).sort((a, b) => b.total - a.total);
  document.getElementById('leaderName').textContent = sortedMap[0].name + '教室';
  document.getElementById('leaderPts').textContent = '累計 ' + sortedMap[0].total + ' pts';
}

// ===== Week toggle =====
function setWeek(w) {
  currentWeek = w;
  document.getElementById('btnWeek1').classList.toggle('active', w === 1);
  document.getElementById('btnWeek2').classList.toggle('active', w === 2);
  renderShips();
  updateRanking();
  updateLeader();
}

// ===== Zoom & Pan =====
function applyTransform() {
  const track = document.getElementById('track');
  track.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
  document.getElementById('zoomLabel').textContent = Math.round(zoomLevel * 100) + '%';
}

function clampPan() {
  const wrapper = document.getElementById('trackWrapper');
  const wW = wrapper.clientWidth;
  const wH = wrapper.clientHeight;
  const maxPanX = 0;
  const minPanX = -(TRACK_WIDTH * zoomLevel - wW);
  const maxPanY = 20;
  const minPanY = -(TRACK_HEIGHT * zoomLevel - wH);
  panX = Math.max(Math.min(panX, maxPanX), Math.min(minPanX, maxPanX));
  panY = Math.max(Math.min(panY, maxPanY), Math.min(minPanY, maxPanY));
}

function zoomIn() {
  if (zoomLevel >= ZOOM_MAX) return;
  // Zoom toward center of viewport
  const wrapper = document.getElementById('trackWrapper');
  const cx = wrapper.clientWidth / 2;
  const cy = wrapper.clientHeight / 2;
  const oldZ = zoomLevel;
  zoomLevel = Math.min(zoomLevel + ZOOM_STEP, ZOOM_MAX);
  const scale = zoomLevel / oldZ;
  panX = cx - scale * (cx - panX);
  panY = cy - scale * (cy - panY);
  clampPan();
  applyTransform();
}

function zoomOut() {
  if (zoomLevel <= ZOOM_MIN) return;
  const wrapper = document.getElementById('trackWrapper');
  const cx = wrapper.clientWidth / 2;
  const cy = wrapper.clientHeight / 2;
  const oldZ = zoomLevel;
  zoomLevel = Math.max(zoomLevel - ZOOM_STEP, ZOOM_MIN);
  const scale = zoomLevel / oldZ;
  panX = cx - scale * (cx - panX);
  panY = cy - scale * (cy - panY);
  clampPan();
  applyTransform();
}

function zoomReset() {
  zoomLevel = 1; panX = 0; panY = 0;
  applyTransform();
}

function zoomToLeaders() {
  // Zoom to top 3
  const sorted = classrooms.map((c, i) => ({i, pts: getPoints(c, currentWeek)}))
    .sort((a, b) => b.pts - a.pts);
  const top3 = sorted.slice(0, 3);
  let sumX = 0, sumY = 0;
  top3.forEach(({i}) => {
    if (ships[i]) {
      sumX += parseFloat(ships[i].style.left) + 22;
      sumY += parseFloat(ships[i].style.top) + 30;
    }
  });
  const cx = sumX / 3, cy = sumY / 3;
  zoomLevel = 3;
  const wrapper = document.getElementById('trackWrapper');
  panX = -(cx * zoomLevel - wrapper.clientWidth / 2);
  panY = -(cy * zoomLevel - wrapper.clientHeight / 2);
  clampPan();
  applyTransform();
}

// ===== Drag to pan =====
function initDragPan() {
  const wrapper = document.getElementById('trackWrapper');

  // Mouse
  wrapper.addEventListener('mousedown', e => {
    if (e.target.closest('.ship')) return; // don't drag when clicking ships
    isDragging = true;
    dragStartX = e.clientX; dragStartY = e.clientY;
    dragPanStartX = panX; dragPanStartY = panY;
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    panX = dragPanStartX + (e.clientX - dragStartX);
    panY = dragPanStartY + (e.clientY - dragStartY);
    clampPan();
    applyTransform();
  });
  window.addEventListener('mouseup', () => { isDragging = false; });

  // Touch
  wrapper.addEventListener('touchstart', e => {
    if (e.target.closest('.ship')) return;
    if (e.touches.length === 1) {
      isDragging = true;
      dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
      dragPanStartX = panX; dragPanStartY = panY;
    }
  }, {passive: true});
  wrapper.addEventListener('touchmove', e => {
    if (!isDragging || e.touches.length !== 1) return;
    panX = dragPanStartX + (e.touches[0].clientX - dragStartX);
    panY = dragPanStartY + (e.touches[0].clientY - dragStartY);
    clampPan();
    applyTransform();
    e.preventDefault();
  }, {passive: false});
  wrapper.addEventListener('touchend', () => { isDragging = false; });

  // Mouse wheel zoom
  wrapper.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = wrapper.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const oldZ = zoomLevel;
    if (e.deltaY < 0) {
      zoomLevel = Math.min(zoomLevel + 0.3, ZOOM_MAX);
    } else {
      zoomLevel = Math.max(zoomLevel - 0.3, ZOOM_MIN);
    }
    const scale = zoomLevel / oldZ;
    panX = mx - scale * (mx - panX);
    panY = my - scale * (my - panY);
    clampPan();
    applyTransform();
  }, {passive: false});
}

// ===== Race animation =====
function playAnimation() {
  zoomReset();
  setWeek(1);

  setTimeout(() => {
    const overlay = document.getElementById('animOverlay');
    overlay.classList.add('active');
    for (let i = 0; i < 30; i++) {
      const line = document.createElement('div');
      line.className = 'warp-line';
      line.style.left = Math.random() * 100 + '%';
      line.style.height = (Math.random() * 200 + 100) + 'px';
      line.style.animationDelay = Math.random() * 0.5 + 's';
      overlay.appendChild(line);
    }

    setTimeout(() => {
      setWeek(2);
      setTimeout(() => {
        overlay.classList.remove('active');
        overlay.innerHTML = '';
      }, 800);
    }, 600);
  }, 1500);
}

// ===== Resize =====
window.addEventListener('resize', () => {
  trackPoints = generateTrackPoints(600);
  renderTrackDots();
  renderShips();
  clampPan();
  applyTransform();
  const canvas = document.getElementById('starsCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ===== Start =====
window.addEventListener('DOMContentLoaded', init);
</script>
