<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>プライムコース 教室対抗 小テストバトル</title>
<style>
  :root{
    --cyan:#20B0E4; --navy:#0C57A3; --orange:#F49D20;
    --ink:#0C57A3; --paper:#ffffff;
    --shadow:6px 6px 0 var(--navy);
    --shadow-sm:4px 4px 0 var(--navy);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;color:var(--ink)}
  body{
    background:var(--paper);
    position:relative;
    background-image:
      radial-gradient(circle,var(--cyan) 2px,transparent 2.5px),
      radial-gradient(circle,var(--orange) 1.6px,transparent 2px);
    background-size:44px 44px, 44px 44px;
    background-position:0 0, 22px 22px;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;
    background:
      linear-gradient(135deg,rgba(32,176,228,.12) 0 12px,transparent 12px 26px) top left/60px 60px,
      radial-gradient(ellipse at top right,rgba(244,157,32,.18),transparent 55%),
      radial-gradient(ellipse at bottom left,rgba(12,87,163,.12),transparent 55%);
  }
  .screen{position:fixed;inset:0;display:none;flex-direction:column;padding:2vh 3vw;z-index:1}
  .screen.active{display:flex}

  /* ===== Title ===== */
  #title{justify-content:center;align-items:center;text-align:center}
  .logo{
    font-size:clamp(28px,5.5vw,68px);font-weight:900;letter-spacing:.05em;
    color:var(--navy);line-height:1.15;
    text-shadow:4px 4px 0 var(--orange), 8px 8px 0 var(--cyan);
    margin-bottom:2vh;
    -webkit-text-stroke:1px var(--navy);
  }
  .logo small{
    display:inline-block;font-size:.35em;letter-spacing:.3em;
    color:var(--paper);background:var(--orange);
    padding:.3em 1em;border-radius:999px;margin-bottom:.6em;
    text-shadow:none;-webkit-text-stroke:0;
    box-shadow:var(--shadow-sm);border:2px solid var(--navy);
  }
  .sub{
    font-size:clamp(14px,1.6vw,20px);font-weight:800;
    color:var(--paper);background:var(--cyan);
    display:inline-block;padding:.6em 1.4em;border-radius:999px;
    margin:1vh 0 3vh;border:2.5px solid var(--navy);
    box-shadow:var(--shadow-sm);
  }
  .grid{
    display:grid;grid-template-columns:repeat(5,1fr);gap:1.4vh 1vw;
    width:min(900px,90vw);
  }
  .cls-btn{
    background:var(--paper);border:2.5px solid var(--navy);color:var(--navy);
    padding:1.4vh .5vw;border-radius:14px;font-size:clamp(13px,1.4vw,18px);
    font-weight:900;cursor:pointer;transition:all .15s;
    box-shadow:var(--shadow-sm);
    position:relative;overflow:hidden;
  }
  .cls-btn::before{
    content:"";position:absolute;inset:0;opacity:0;transition:opacity .2s;
    background-image:radial-gradient(circle,rgba(255,255,255,.6) 1.5px,transparent 2px);
    background-size:12px 12px;
  }
  .cls-btn:hover{
    background:var(--orange);color:var(--paper);
    transform:translate(-2px,-2px);
    box-shadow:6px 6px 0 var(--navy);
  }
  .cls-btn:hover::before{opacity:1}
  .cls-btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--navy)}

  /* ===== Match ===== */
  #match{padding:2vh 3vw}
  .header{
    display:flex;align-items:center;gap:1.2vw;margin-bottom:1.5vh;
    flex-wrap:wrap;
  }
  .back{
    background:var(--paper);border:2.5px solid var(--navy);color:var(--navy);
    padding:.8vh 1.2vw;border-radius:10px;cursor:pointer;font-size:14px;
    font-weight:900;box-shadow:var(--shadow-sm);transition:all .15s;
  }
  .back:hover{background:var(--cyan);color:var(--paper);transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--navy)}
  .my-cls{
    font-size:clamp(20px,2.8vw,34px);font-weight:900;
    color:var(--navy);
    text-shadow:3px 3px 0 var(--orange);
    padding:0 .4em;
  }
  .tag{
    background:var(--navy);color:var(--paper);
    padding:.5vh 1vw;border-radius:999px;font-size:12px;font-weight:900;letter-spacing:.15em;
    border:2px solid var(--navy);box-shadow:3px 3px 0 var(--orange);
  }
  .tag.orange{background:var(--orange);box-shadow:3px 3px 0 var(--navy)}
  .matches{
    flex:1;display:flex;flex-direction:column;gap:1vh;
    min-height:0;width:min(960px,98%);margin:0 auto;
  }
  .card{
    background:var(--paper);
    border:3px solid var(--navy);border-radius:18px;
    padding:.8vh 2vw;display:grid;
    grid-template-columns:auto 1fr auto auto;
    align-items:center;gap:2.5vw;
    position:relative;overflow:hidden;
    transition:all .2s;flex:1;min-height:0;
    box-shadow:var(--shadow);
  }
  .card::before{
    /* stripe accent on left */
    content:"";position:absolute;left:0;top:0;bottom:0;width:14px;
    background:repeating-linear-gradient(
      45deg,
      var(--cyan) 0 8px,
      var(--paper) 8px 16px
    );
    border-right:2px solid var(--navy);
  }
  .card::after{
    /* polka dot bg */
    content:"";position:absolute;inset:0;pointer-events:none;opacity:.08;
    background-image:radial-gradient(circle,var(--navy) 1.5px,transparent 2px);
    background-size:18px 18px;
  }
  .card:hover{transform:translate(-3px,-3px);box-shadow:9px 9px 0 var(--navy)}
  .card.next{
    background:var(--orange);
    border-color:var(--navy);
  }
  .card.next::before{
    background:repeating-linear-gradient(
      45deg,
      var(--navy) 0 8px,
      var(--orange) 8px 16px
    );
  }
  .card.next::after{
    opacity:.18;
    background-image:radial-gradient(circle,var(--paper) 2px,transparent 2.5px);
    background-size:20px 20px;
  }
  .card.next .test-no,
  .card.next .test-no .num,
  .card.next .opp,
  .card.next .vs,
  .card.next .dates,
  .card.next .dates .lbl,
  .card.next .dates b,
  .card.next .dates .res{color:var(--paper)}
  .card.next .badge{
    position:absolute;top:6px;right:10px;
    background:var(--paper);color:var(--orange);font-size:10px;font-weight:900;
    padding:3px 10px;border-radius:6px;letter-spacing:.15em;
    border:2px solid var(--navy);box-shadow:2px 2px 0 var(--navy);
  }
  .test-no{
    font-size:clamp(11px,1vw,13px);font-weight:900;color:var(--cyan);
    letter-spacing:.15em;text-align:center;line-height:1;
    padding-left:1vw;position:relative;z-index:1;
  }
  .test-no .num{font-size:2.8em;display:block;color:var(--orange);font-weight:900;line-height:1;
    text-shadow:2px 2px 0 var(--navy);}
  .opp-wrap{display:flex;align-items:center;gap:1.5vw;position:relative;z-index:1}
  .vs{
    font-size:clamp(12px,1.3vw,16px);font-weight:900;letter-spacing:.15em;
    color:var(--paper);background:var(--cyan);
    padding:.3em .7em;border-radius:6px;border:2px solid var(--navy);
  }
  .opp{
    font-size:clamp(22px,3.4vw,42px);font-weight:900;line-height:1.1;
    color:var(--navy);
    text-shadow:3px 3px 0 var(--orange);
  }
  .dates{font-size:clamp(16px,2vw,26px);line-height:1.2;text-align:right;font-weight:900;white-space:nowrap;position:relative;z-index:1}
  .dates .lbl{font-size:.6em;letter-spacing:.15em;font-weight:900;margin-right:.4em;
    background:var(--navy);color:var(--paper);padding:.25em .7em;border-radius:6px;vertical-align:middle}
  .dates b{color:var(--navy);font-weight:900}
  .dates .res{color:var(--cyan);font-weight:900}

  @media (max-width:900px){
    .grid{grid-template-columns:repeat(3,1fr)}
    html,body{overflow:auto}
    .card{grid-template-columns:auto 1fr;gap:4vw}
    .dates{grid-column:1/-1;text-align:left}
  }
</style>
</head>
<body>

<!-- ===== Title Screen ===== -->
<section id="title" class="screen active">
  <h1 class="logo">
    <small>PRIME COURSE</small>
    プライムコース<br>教室対抗 小テストバトル
  </h1>
  <p class="sub">▼ 自教室を選択してね ▼</p>
  <div class="grid" id="classGrid"></div>
</section>

<!-- ===== Match Screen ===== -->
<section id="match" class="screen">
  <div class="header">
    <button class="back" onclick="show('title')">← 戻る</button>
    <span class="tag">MY CLASSROOM</span>
    <span class="my-cls" id="myCls"></span>
    <span class="tag orange">対戦スケジュール</span>
  </div>
  <div class="matches" id="matches"></div>
</section>

<script>
  const CLASSES = ["五位堂","京田辺","八木","奈良","学園前","木津南","桜井","王寺","生駒","登美ヶ丘","神宮","西大寺","郡山","高の原","高田"];
  const SCHEDULE = [
    {no:"①",jissi:"4/20〜26",  hapyo:"5/11〜17"},
    {no:"②",jissi:"4/27〜5/3", hapyo:"5/18〜24"},
    {no:"③",jissi:"5/11〜17",  hapyo:"5/25〜31"},
    {no:"④",jissi:"6/8〜14",   hapyo:"6/22〜28"},
    {no:"⑤",jissi:"6/15〜21",  hapyo:"6/29〜7/5"},
    {no:"⑥",jissi:"6/22〜28",  hapyo:"7/6〜12"},
    {no:"⑦",jissi:"6/29〜7/5", hapyo:"7/13〜19"},
  ];

  // Build title grid
  const grid = document.getElementById('classGrid');
  CLASSES.forEach(c=>{
    const b=document.createElement('button');
    b.className='cls-btn';b.textContent=c;
    b.onclick=()=>selectClass(c);
    grid.appendChild(b);
  });

  function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function selectClass(name){
    document.getElementById('myCls').textContent=name;
    const idx=CLASSES.indexOf(name);
    const wrap=document.getElementById('matches');
    wrap.innerHTML='';
    // Determine "next" upcoming test (first whose 実施 hasn't fully passed). Simplified: always highlight first.
    const today=new Date();
    let nextIdx=-1;
    SCHEDULE.forEach((s,i)=>{
      if(nextIdx===-1 && !isPast(s.jissi)) nextIdx=i;
    });
    SCHEDULE.forEach((s,i)=>{
      const opp=CLASSES[(idx+i+1)%CLASSES.length];
      const card=document.createElement('div');
      card.className='card'+(i===nextIdx?' next':'');
      card.innerHTML=`
        ${i===nextIdx?'<span class="badge">NEXT</span>':''}
        <div class="test-no">TEST<span class="num">${s.no}</span></div>
        <div class="opp-wrap"><span class="vs">VS</span><span class="opp">${opp}</span></div>
        <div class="dates"><span class="lbl">実施</span><b>${s.jissi}</b></div>
        <div class="dates"><span class="lbl">結果</span><span class="res">${s.hapyo}</span></div>`;
      wrap.appendChild(card);
    });
    show('match');
  }

  function isPast(range){
    // range like "6/29〜7/5" - check end date in 2026
    const end=range.split('〜').pop();
    let m,d;
    if(end.includes('/')){[m,d]=end.split('/').map(Number);}
    else{
      // "5/3" style already handled; fallback use start month
      const start=range.split('〜')[0];
      const sm=Number(start.split('/')[0]);
      m=sm;d=Number(end);
    }
    const endDate=new Date(2026,m-1,d);
    return endDate < new Date();
  }
</script>
</body>
</html>
