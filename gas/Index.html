<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>プライムコース 教室対抗 小テストバトル</title>
<style>
  :root{
    --cyan:#20B0E4; --navy:#0C57A3; --orange:#F49D20;
    --ink:#0C57A3; --paper:#ffffff;
    --shadow:0 4px 14px rgba(12,87,163,.12);
    --shadow-hover:0 8px 22px rgba(12,87,163,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;color:var(--ink)}
  body{
    background:var(--paper);
    position:relative;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(ellipse at top right,rgba(244,157,32,.08),transparent 55%),
      radial-gradient(ellipse at bottom left,rgba(32,176,228,.08),transparent 55%);
  }
  .screen{position:fixed;inset:0;display:none;flex-direction:column;padding:2vh 3vw;z-index:1}
  .screen.active{display:flex}

  /* ===== Title ===== */
  #title{justify-content:center;align-items:center;text-align:center}
  .logo{
    font-size:clamp(28px,5.5vw,68px);font-weight:900;letter-spacing:.05em;
    color:var(--navy);line-height:1.2;
    margin-bottom:2vh;
  }
  .logo small{
    display:inline-block;font-size:.32em;letter-spacing:.3em;
    color:var(--paper);background:var(--orange);
    padding:.35em 1.2em;border-radius:999px;margin-bottom:.8em;
  }
  .logo .accent{color:var(--orange)}
  .sub{
    font-size:clamp(14px,1.6vw,18px);font-weight:700;
    color:var(--navy);
    margin:1vh 0 3vh;
  }
  .grid{
    display:grid;grid-template-columns:repeat(5,1fr);gap:1.2vh 1vw;
    width:min(900px,90vw);
  }
  .cls-btn{
    background:var(--paper);border:2px solid var(--cyan);color:var(--navy);
    padding:1.4vh .5vw;border-radius:12px;font-size:clamp(13px,1.4vw,18px);
    font-weight:800;cursor:pointer;transition:all .18s;
    box-shadow:var(--shadow);
  }
  .cls-btn:hover{
    background:var(--cyan);color:var(--paper);
    border-color:var(--cyan);
    transform:translateY(-2px);
    box-shadow:var(--shadow-hover);
  }

  /* ===== Match ===== */
  #match{padding:2vh 3vw}
  .header{
    display:flex;align-items:center;gap:1.2vw;margin-bottom:1.5vh;
    flex-wrap:wrap;
  }
  .back{
    background:var(--paper);border:2px solid var(--navy);color:var(--navy);
    padding:.7vh 1.2vw;border-radius:8px;cursor:pointer;font-size:14px;
    font-weight:800;transition:all .15s;
  }
  .back:hover{background:var(--navy);color:var(--paper)}
  .my-cls{
    font-size:clamp(22px,3vw,36px);font-weight:900;
    color:var(--navy);
    padding:0 .3em;
  }
  .tag{
    background:var(--navy);color:var(--paper);
    padding:.5vh 1vw;border-radius:999px;font-size:12px;font-weight:800;letter-spacing:.1em;
  }
  .tag.orange{background:var(--orange)}
  .matches{
    flex:1;display:flex;flex-direction:column;gap:1vh;
    min-height:0;width:min(960px,98%);margin:0 auto;
  }
  .card{
    background:var(--paper);
    border:1.5px solid #e5eef7;border-left:6px solid var(--cyan);
    border-radius:12px;
    padding:.8vh 2vw;display:grid;
    grid-template-columns:auto 1fr auto auto;
    align-items:center;gap:2.5vw;
    position:relative;
    transition:all .2s;flex:1;min-height:0;
    box-shadow:var(--shadow);
  }
  .card:hover{transform:translateX(3px);box-shadow:var(--shadow-hover);border-left-color:var(--orange)}
  .card.next{
    border-left-color:var(--orange);
    border-left-width:8px;
    background:linear-gradient(90deg,rgba(244,157,32,.08),var(--paper) 30%);
  }
  .card.next .badge{
    position:absolute;top:-10px;right:14px;
    background:var(--orange);color:var(--paper);font-size:11px;font-weight:900;
    padding:3px 12px;border-radius:999px;letter-spacing:.15em;
    box-shadow:0 3px 8px rgba(244,157,32,.4);
  }
  .test-no{
    font-size:clamp(10px,.9vw,12px);font-weight:800;color:var(--cyan);
    letter-spacing:.15em;text-align:center;line-height:1;
    padding-left:1vw;
  }
  .test-no .num{font-size:3em;display:block;color:var(--navy);font-weight:900;line-height:1;margin-top:.1em}
  .opp-wrap{display:flex;align-items:center;gap:1.2vw}
  .vs{
    font-size:clamp(11px,1.1vw,14px);font-weight:800;letter-spacing:.15em;
    color:var(--cyan);
  }
  .opp{
    font-size:clamp(24px,3.6vw,44px);font-weight:900;line-height:1.1;
    color:var(--navy);
  }
  .dates{font-size:clamp(15px,1.8vw,22px);line-height:1.2;text-align:right;font-weight:800;white-space:nowrap;color:var(--navy)}
  .dates .lbl{font-size:.65em;letter-spacing:.1em;font-weight:700;margin-right:.5em;
    color:var(--paper);background:var(--cyan);padding:.2em .7em;border-radius:5px;vertical-align:middle}
  .dates.res-wrap .lbl{background:var(--orange)}

  @media (max-width:900px){
    .grid{grid-template-columns:repeat(3,1fr)}
    html,body{overflow:auto}
    .card{grid-template-columns:auto 1fr;gap:4vw}
    .dates{grid-column:1/-1;text-align:left}
  }
</style>
</head>
<body>

<!-- ===== Title Screen ===== -->
<section id="title" class="screen active">
  <h1 class="logo">
    <small>PRIME COURSE</small>
    プライムコース<br>教室対抗 小テストバトル
  </h1>
  <p class="sub">▼ 自教室を選択してね ▼</p>
  <div class="grid" id="classGrid"></div>
</section>

<!-- ===== Match Screen ===== -->
<section id="match" class="screen">
  <div class="header">
    <button class="back" onclick="show('title')">← 戻る</button>
    <span class="tag">MY CLASSROOM</span>
    <span class="my-cls" id="myCls"></span>
    <span class="tag orange">対戦スケジュール</span>
  </div>
  <div class="matches" id="matches"></div>
</section>

<script>
  const CLASSES = ["五位堂","京田辺","八木","奈良","学園前","木津南","桜井","王寺","生駒","登美ヶ丘","神宮","西大寺","郡山","高の原","高田"];
  const SCHEDULE = [
    {no:"①",jissi:"4/20〜26",  hapyo:"5/11〜17"},
    {no:"②",jissi:"4/27〜5/3", hapyo:"5/18〜24"},
    {no:"③",jissi:"5/11〜17",  hapyo:"5/25〜31"},
    {no:"④",jissi:"6/8〜14",   hapyo:"6/22〜28"},
    {no:"⑤",jissi:"6/15〜21",  hapyo:"6/29〜7/5"},
    {no:"⑥",jissi:"6/22〜28",  hapyo:"7/6〜12"},
    {no:"⑦",jissi:"6/29〜7/5", hapyo:"7/13〜19"},
  ];

  // Build title grid
  const grid = document.getElementById('classGrid');
  CLASSES.forEach(c=>{
    const b=document.createElement('button');
    b.className='cls-btn';b.textContent=c;
    b.onclick=()=>selectClass(c);
    grid.appendChild(b);
  });

  function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function selectClass(name){
    document.getElementById('myCls').textContent=name;
    const idx=CLASSES.indexOf(name);
    const wrap=document.getElementById('matches');
    wrap.innerHTML='';
    // Determine "next" upcoming test (first whose 実施 hasn't fully passed). Simplified: always highlight first.
    const today=new Date();
    let nextIdx=-1;
    SCHEDULE.forEach((s,i)=>{
      if(nextIdx===-1 && !isPast(s.jissi)) nextIdx=i;
    });
    SCHEDULE.forEach((s,i)=>{
      const opp=CLASSES[(idx+i+1)%CLASSES.length];
      const card=document.createElement('div');
      card.className='card'+(i===nextIdx?' next':'');
      card.innerHTML=`
        ${i===nextIdx?'<span class="badge">NEXT</span>':''}
        <div class="test-no">TEST<span class="num">${s.no}</span></div>
        <div class="opp-wrap"><span class="vs">VS</span><span class="opp">${opp}</span></div>
        <div class="dates"><span class="lbl">実施</span>${s.jissi}</div>
        <div class="dates res-wrap"><span class="lbl">結果</span>${s.hapyo}</div>`;
      wrap.appendChild(card);
    });
    show('match');
  }

  function isPast(range){
    // range like "6/29〜7/5" - check end date in 2026
    const end=range.split('〜').pop();
    let m,d;
    if(end.includes('/')){[m,d]=end.split('/').map(Number);}
    else{
      // "5/3" style already handled; fallback use start month
      const start=range.split('〜')[0];
      const sm=Number(start.split('/')[0]);
      m=sm;d=Number(end);
    }
    const endDate=new Date(2026,m-1,d);
    return endDate < new Date();
  }
</script>
</body>
</html>
